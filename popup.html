<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 220px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 12px;
      margin: 0;
      background-color: #f8f9fa;
      color: #333;
    }
    h3 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 14px;
      text-align: center;
      color: #4a5568;
    }
    .wrapper {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }
    input[type="color"] {
      width: 100%;
      height: 40px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: none;
    }
    button {
      width: 100%;
      padding: 8px 12px;
      background-color: #3742fa;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #2f3542;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <h3>Saç Rengi Seçin 🎨</h3>
    <input type="color" id="hairColorPicker" value="#fca8d2">
    <button id="applyColorBtn">Rengi Uygula 🚀</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
